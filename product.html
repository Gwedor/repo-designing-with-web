<head>
    <meta charset="UTF-8">

    <!-- a comment -->
    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Nixie+One&display=swap" rel="stylesheet">

</head>

<body>
    <nav class="flex-row-space-between">
        <!-- J'ai demandé à Gemini comment supprimer le soulignage sous Origin du fait qu'il soit cliquable -->
        <a href="index2.html" style="text-decoration: none;">
            <h1 style="margin-left: 10px;">Origin</h1>
        </a>
            
        <ul class="menu">
            <li>Cafés</li>
            <li>Thés</li>
            <li>Accessoires</li>
            <!-- J'ai demandé à Gemini comment mettre un espace entre Promotions et l'icône search, j'ai donc ajouté un margin-right -->
            <li style="color: rgba(200, 147, 48, 1); margin-right: 40px;">Promotions</li>
            <li><i data-lucide="search"></i></li>
            <li><i data-lucide="user"></i></li>
            <li style="margin-right: 10px;"><i data-lucide="shopping-basket"></i></li>
        </ul>
    </nav>
    <hr>

    <!-- J'ai demandé à Gemini de me donner la strucutur propre pour pouvoir avoir la moitié gauche pour la photo et la moitié droite pour la description du produit-->
    <section class="product-detail-container">
    <div class="product-image-side">
        <img id="product-image">
    </div>

    <div class="product-info-side">
        <p id="product-title" style="font-family: 'Archivo Black'; font-size: 20px;">HONDURAS</p>
        <ul class="intensites">
            <li>Intensités :</li>
            <li><img src="images/graine-pleine.png"></li>
            <li><img src="images/graine-pleine.png"></li>
            <li><img src="images/graine-pleine.png"></li>
            <li><img src="images/graine-vide.png"></li>
            <li><img src="images/graine-vide.png"></li>
        </ul>
        <!-- J'avais ceci : <p id="product-description"></p>, j'ai demandé à Claude comment avoir "Profil :" marqué avant afin de conserver le design du Figma -->
        <p><b>Profil </b>: <span id="product-description"></span></p>
        <p id="product-price" style="font-family: 'Archivo Black'; font-size: 18px; margin-bottom: 0;"></p>
        <p style="margin-top: 0px;">
            (42€ /kg)
        </p>
        Format
        <div class="button-group">
            <button class="button2 active">250g</button>
            <button class="button2">500g</button>
            <button class="button2">750g</button>
        </div>
        Mouture
        <div class="button-group">
            <button class="button2">Grains</button>
            <button class="button2 active">Espresso</button>
            <button class="button2">Italienne</button>
        </div>
        <button style="margin-left: 0px; margin-top: 65px; font-size: 25px;" class="button">Ajouter au panier</button>
    </div>
    </section>

    <!-- loading the lucide icons -->
     <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        lucide.createIcons();
    </script>

    <!-- J'ai demandé à Claude comment faire en sorte de bien arriver sur la page du produit sur lequel on clique
     J'ai ensuite réutilisé les différentes target dans le code html pour le rendre dynamique -->
    <script>
        const params = new URLSearchParams(window.location.search);
        const brand = params.get("brand");
        const index = parseInt(params.get("index"));

        fetch("https://makerslab.em-lyon.com/dww/data/products.json")
            .then(response => response.json())
            .then(data => {
                const model = data.items[brand][index];

                document.querySelector("#product-image").src = model.image;
                document.querySelector("#product-title").textContent = model.name.toUpperCase();
                document.querySelector("#product-description").textContent = model.description;
                document.querySelector("#product-price").textContent = model.price + "€";
            });
    </script>
</body>
